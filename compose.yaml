services:
  kanban:
    image: ghcr.io/eg0170/kanban:latest
    container_name: kanban
    restart: unless-stopped
    ports:
      - "3030:3000"   # host 3030 (3000 is taken by Homepage) -> container 3000
    volumes:
      - kanban-data:/data
      - kanban-backups:/backups   # NFS share on the NAS (defined below)
    environment:
      - PORT=3000
      - DB_PATH=/data/kanban.db
      # Optional first-run seed defaults (applied only when the DB is empty).
      # You can also set these in the app: rename people in Settings, edit
      # categories in the Categories dialog.
      # - DEFAULT_PERSON1=Person 1
      # - DEFAULT_PERSON2=Person 2
      # - DEFAULT_CATEGORIES=Home,Health,Work,Errands
      # Automated SQLite backups (consistent online snapshots) -> NFS share on
      # the NAS (kanban-backups volume below). Tune or disable:
      - BACKUP_DIR=/backups
      # - BACKUP_INTERVAL_HOURS=24   # 0 disables automated backups
      # - BACKUP_KEEP=14
    labels:
      # Opt this container in to Watchtower auto-updates.
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # containrrr/watchtower was archived 2025-12-17 and no longer speaks the
    # Docker API version modern engines require. nickfedor/watchtower is the
    # maintained drop-in replacement (same flags and env vars).
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: kanban-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 60
    # --label-enable  : only update containers that opt in via the label above
    # --cleanup       : remove the old image after a successful update
    # --interval 60   : check GHCR for a new image every 60 seconds. Checks are
    #                   cheap (a registry digest comparison), so polling often
    #                   is fine. For *instant* updates instead of polling, drop
    #                   --interval and add --http-api-update, then have the
    #                   GitHub Action POST to Watchtower's /v1/update endpoint
    #                   after publishing the image.

volumes:
  kanban-data:
  # Backups land on the NAS over NFS. Edit the two values below to match your
  # NAS: 'addr' is the NAS IP/hostname, 'device' is the NFS export path (keep
  # the leading colon). The export must allow this server's IP read/write.
  kanban-backups:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.10,nfsvers=4,rw"
      device: ":/volume1/backups/kanban"
