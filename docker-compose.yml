services:
  kanban:
    build: .
    container_name: kanban
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - kanban-data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/kanban.db
      # Optional first-run seed defaults (applied only when the DB is empty).
      # You can also set these later in the app: rename people in Settings,
      # edit categories in the Categories dialog.
      # - DEFAULT_PERSON1=Person 1
      # - DEFAULT_PERSON2=Person 2
      # - DEFAULT_CATEGORIES=Home,Health,Work,Errands

volumes:
  kanban-data:
